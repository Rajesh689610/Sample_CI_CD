name: Build API

on:
  push:
    branches:
      - int

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - run: dotnet restore CI_CD.slnx

    - run: dotnet build CI_CD.slnx --configuration Release

    - run: dotnet test CI_CD.slnx