name: Deploy API

on:
  push:
    branches:
      - int

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release

    - name: Publish
      run: dotnet publish -c Release -o Publish

    - name: Copy Files to int
      run: |
        xcopy Publish\* D:\Projects\INT /E /Y

    - name: Restart IIS
      run: iisreset
